    TieringHoldDetail:
      type: object
      description: |
        Structured explanation of a hold/keep verdict: which gate is holding
        the partition, the clock it is waiting on, and — where computable —
        when it releases. successor-activity releases at the dead-group
        horizon unless a newer sibling receives inserts first; stalled holds
        carry the retry schedule instead.
      required:
        - gate
      additionalProperties: false
      properties:
        gate:
          type: string
          description: >-
            One of replica-health, mutation, part-log-required, insert-quiet,
            physical-quiet, successor-activity, age, or stalled.
        window:
          type: string
          description: Quiet/age window the gate applies.
        lastInsertAt:
          type: string
          format: date-time
        lastChangeAt:
          type: string
          format: date-time
        releasesAt:
          type: string
          format: date-time
        retryAt:
          type: string
          format: date-time
        failures:
          type: integer
